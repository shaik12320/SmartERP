<!DOCTYPE html>
<html>
<head>
    <title>SmartERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            background: linear-gradient(135deg,#2563eb,#7c3aed);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .welcome-box{
            background:white;
            width:800px;
            padding:50px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .erp-icon{
            font-size:80px;
        }

        h1{
            font-size:50px;
            font-weight:bold;
            color:#1f2937;
        }

        .subtitle{
            color:#6b7280;
            font-size:20px;
            margin-bottom:25px;
        }

        .btn-login{
            background:#2563eb;
            color:white;
            padding:12px 35px;
            border:none;
            border-radius:10px;
            font-size:18px;
            text-decoration:none;
        }

        .btn-login:hover{
            background:#1d4ed8;
            color:white;
        }
    </style>
</head>
<body>

    <div class="welcome-box">

        <div class="erp-icon">
            🚀
        </div>

        <h1>Welcome to SmartERP</h1>

        <p class="subtitle">
            Enterprise Resource Planning System
        </p>

        <p>
            Manage Customers, Suppliers, Inventory,
            Sales, Purchases and Reports from one platform.
        </p>

        <br>

        <a href="/login" class="btn-login">
            Login
        </a>

    </div>

</body>
</html>
