<!DOCTYPE html>
<html>
<head>
    <title>Financial Year Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>📅 Financial Year Management</h2>

    <form method="POST" action="/add_financial_year">

        <div class="mb-3">
            <label>Financial Year</label>
            <input type="text"
                   name="year_name"
                   class="form-control"
                   placeholder="2026-2027"
                   required>
        </div>

        <div class="mb-3">
            <label>Start Date</label>
            <input type="date"
                   name="start_date"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>End Date</label>
            <input type="date"
                   name="end_date"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-primary">
            Save Financial Year
        </button>

    </form>

    <hr>

    <table class="table table-bordered">

    <tr>
        <th>ID</th>
        <th>Year</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Action</th>
    </tr>

    {% for fy in years %}
    <tr>
        <td>{{ fy.id }}</td>
        <td>{{ fy.year_name }}</td>
        <td>{{ fy.start_date }}</td>
        <td>{{ fy.end_date }}</td>

        <td>
            <a href="/select_financial_year/{{ fy.id }}"
               class="btn btn-success btn-sm">
                Select
            </a>
        </td>

    </tr>
    {% endfor %}

</table>

</div>

</body>
</html>
