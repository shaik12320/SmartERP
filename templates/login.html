<!DOCTYPE html>
<html>
<head>
    <title>SmartERP Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .login-card{
            width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            font-size:70px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-top:10px;
            color:#1f2937;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .btn-login{
            width:100%;
            background:#2563eb;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:18px;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:gray;
            font-size:14px;
        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        🚀
    </div>

    <h2 class="title">
        SmartERP
    </h2>

    <p class="subtitle">
        Enterprise Resource Planning System
    </p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

    </form>

    <div class="mt-3">
        <a href="/register" class="btn btn-success w-100">
            Create Account
        </a>
    </div>

    <div class="footer-text">
        SmartERP © 2026
    </div>

</div>

</body>
</html>
